<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="RGB(212,218,239)">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Document</title>
    <link rel="stylesheet" href="./../css/variables.css">
    <link rel="stylesheet" href="./../css/common.css">
    <link rel="stylesheet" href="./../css/style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="./../js/lib/lottie.min.js"></script>
    <script src="./../js/data/json_container.js"></script>
    <script src="./../js/ui/common.js"></script>
    <style>
        .chat-list > li:nth-child(-n + 4){opacity:0;transition:opacity 0.3s ease;}
        .chat-list > li:nth-child(1) { transition-delay: 500ms; }
        .chat-list > li:nth-child(2) { transition-delay: 800ms; }
        .chat-list > li:nth-child(3) { transition-delay: 1100ms; }
        .chat-list > li:nth-child(4) { transition-delay: 1400ms; }
        .chat-list > li.visible:nth-child(-n + 4){opacity:1;}
    </style>
</head>
<body>
    <div class="bg-presentation">
        <div class="wrap">
            <div class="bg-wrap-chat">
                <!-- <div id="bg-prime"></div> -->
                <div class="header">
                    <div class="header-wrap">
                        <div class="header-left">
                            <div class="animates-star" id="animatesStar"></div>
                            <h1 style="font:600 1.7rem/1.4 'Pretendard Variable';">우리와 대화중</h1>
                        </div>
                        <div class="header-right">
                            <button type="button" class="close-btn-prime"></button> 
                        </div>
                    </div>
                </div>
                <div class="content">
                    <div class="chat-wrap">
                        <div class="chat-content">
                            <div class="chat-date-wrap">
                                <h2><span class="chat-year">2026</span>.<span class="chat-month">4</span>.<span class="chat-date">16</span></h2>
                            </div>
                            <ul class="chat-list">
                                <li class="user-msg">
                                    <div class="bubble">
                                        <span>나에게 꼭 맞는 차량은?</span>
                                    </div>
                                </li>
                                <li class="ai-msg">
                                    <div class="bubble">
                                        <span>좋아요! 5가지 질문에 답해주시면, 꼭 맞는 차량을 찾아 드릴께요!</span>
                                    </div>
                                </li>
                                <li class="ai-msg">
                                    <div class="bubble">
                                        <span>주말엔 주로 어디로 떠나시나요?</span>
                                    </div>
                                </li>
                                <li class="ai-msg has-choice-btn">
                                    <ul class="options">
                                        <li class="option" id="natureOption">
                                            <div class="card-wrap">
                                                <input type="radio" name="option1">
                                                <div class="card-info">
                                                    <img src="./../images/bg/option_nature.svg" alt="">
                                                    <span>자연 속 주말러</span>    
                                                </div>
                                            </div>
                                        </li>
                                        <li class="option" id="cityOption">
                                            <div class="card-wrap">
                                                <input type="radio" name="option1">
                                                <div class="card-info">
                                                    <img src="./../images/bg/option_city.svg" alt="">
                                                    <span>도심 드라이버</span>    
                                                </div>
                                            </div>
                                        </li>
                                    </ul>
                                </li>
                            </ul>
                        </div>
                        <div class="user-input-wrap">
                            <input type="text" name="input01" placeholder="AI 에게 물어보세요.">
                            <button type="button"></button>
                        </div>
                    </div>
                </div>
                <div class="footer"></div>
            </div>
        </div>

    </div>
    <script>
    // 헤더색상변환 스크립트
        $('.chat-wrap').on('scroll', function(){
            let scrollTop = $(this).scrollTop();

            if(scrollTop > 0){
                $('.header').addClass('is-scrolled');
            } else {
                $('.header').removeClass('is-scrolled');
            }
        });
    </script>
</body>
</html>

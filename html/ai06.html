<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="RGB(27,62,166)">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Document</title>
    <link rel="stylesheet" href="./../css/variables.css">
    <link rel="stylesheet" href="./../css/common.css">
    <link rel="stylesheet" href="./../css/style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="./../js/lib/lottie.min.js"></script>
    <script src="./../js/data/json_container.js"></script>
    <script src="./../js/ui/common.js"></script>
    <style>
        .tit, .sub-txt, .rd-btn-wrap, .footer {
            transform: translateY(30px);
            opacity: 0;
            transition: transform 0.5s ease, opacity 0.5s ease;
        }

        .tit.slide-in { transition-delay: 0ms; }
        .sub-txt.slide-in { transition-delay: 200ms; }
        .rd-btn-wrap.slide-in { transition-delay: 400ms; }
        .footer.slide-in { transition-delay: 600ms; }

        .tit.slide-in,
        .sub-txt.slide-in,
        .rd-btn-wrap.slide-in,
        .footer.slide-in {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="bg-presentation">
        <div class="wrap">
            <div class="bg-wrap-light">
                <!-- <div id="bg-prime"></div> -->
                <div class="header">
                    <div class="header-wrap">
                        <div class="header-left">
                            <div class="animates-star" id="animatesStar"></div>
                        </div>
                        <h1>우리금융캐피탈</h1>
                        <div class="header-right">
                            <button type="button" class="close-btn-prime"></button> 
                        </div>
                    </div>
                </div>
                <div class="content">
                    <p class="tit">당신의 성향을<br>한 마디로 표현한다면?</p>
                    <p class="sub-txt">다음 중 하나를 선택해주세요</p>
                    <div class="rd-btn-wrap">
                        <div class="rd-btn">
                            <input type="radio" name="type01">
                            <div class="gif-container">
                                <img src="./../images/gif/explorer.gif" alt="">
                            </div>
                            <div class="sub-txt-wrap">
                                <span class="tit-txt">탐험가 DNA</span>
                                <span class="sub-desc">지도보다는 직감을 믿어요.<br>새로운 길을 개척하는게<br>내 스타일!</span>
                            </div>
                        </div>
                        <div class="rd-btn">
                            <input type="radio" name="type01">
                            <div class="gif-container">
                                <img src="./../images/gif/sense.gif" alt="">
                            </div>
                            <div class="sub-txt-wrap">
                                <span class="tit-txt">감각주의자</span>
                                <span class="sub-desc">지도보다는 직감을 믿어요.<br>새로운 길을 개척하는게<br>내 스타일!</span>
                            </div>
                        </div>
                        <div class="rd-btn">
                            <input type="radio" name="type01">
                            <div class="gif-container">
                                <img src="./../images/gif/planner.gif" alt="">
                            </div>
                            <div class="sub-txt-wrap">
                                <span class="tit-txt">전략 설계자</span>
                                <span class="sub-desc">지도보다는 직감을 믿어요.<br>새로운 길을 개척하는게<br>내 스타일!</span>
                            </div>
                        </div>
                        <div class="rd-btn">
                            <input type="radio" name="type01">
                            <div class="gif-container">
                                <img src="./../images/gif/energy.gif" alt="">
                            </div>
                            <div class="sub-txt-wrap">
                                <span class="tit-txt">에너지 드라이버</span>
                                <span class="sub-desc">지도보다는 직감을 믿어요.<br>새로운 길을 개척하는게<br>내 스타일!</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="footer">
                    <a href="./ai07.html"><span>다음</span></a>
                </div>
            </div>
        </div>
    </div>
    <script>
        $(document).ready(function(){
            setTimeout(function(){
                $('.tit, .sub-txt, .rd-btn-wrap, .footer').addClass('slide-in');
            }, 300);
            $(document).on('change', '.rd-btn input[type="radio"]', function(){
                if($(this).prop('checked')){
                    $('.footer a').addClass('is-active');
                }
            });
        });
    </script>
</body>
</html>
